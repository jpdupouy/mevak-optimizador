name: Mevak Hunting Agent
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  hunting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install anthropic tavily-python gspread google-auth PyNaCl
      - name: Correr hunting agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ACUAIA_EMAIL_PASSWORD: ${{ secrets.ACUAIA_EMAIL_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_SECRET_KEY: ${{ secrets.ML_SECRET_KEY }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          ML_TOKEN_ROTATOR: ${{ secrets.ML_TOKEN_ROTATOR }}
          GITHUB_REPO: jpdupouy/mevak-agente
        run: python hunting_mevak_v3.py
